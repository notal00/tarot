<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>是与非 · Tarot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #f4f0e8;
      --text:        #1e1a14;
      --text-dim:    #7a6f5e;
      --accent:      #8b6843;
      --accent-soft: #c4a47c;
      --border:      rgba(139,104,67,0.2);
      --divider:     rgba(139,104,67,0.25);
      --card-bg:     #13101a;
      --card-gold:   #c4a47c;
      --card-gdim:   rgba(196,164,124,0.3);
      --shadow:      0 12px 40px rgba(0,0,0,0.1);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:          #0b0910;
        --text:        #e8dcc8;
        --text-dim:    #9a8e7e;
        --accent:      #c4a47c;
        --accent-soft: #8b6843;
        --border:      rgba(196,164,124,0.15);
        --divider:     rgba(196,164,124,0.18);
        --card-bg:     #0d0b14;
        --card-gdim:   rgba(196,164,124,0.22);
        --shadow:      0 12px 48px rgba(0,0,0,0.55);
      }
    }

    /* 之前这里可能缺失了闭合括号，导致解析失败 */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Noto Serif SC', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background .4s, color .4s;
    }
    body::before {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background:
        radial-gradient(ellipse 60% 50% at 15% 15%, rgba(196,164,124,.06) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 85% 85%, rgba(139,104,67,.06) 0%, transparent 70%);
    }

    .page {
      position:relative; z-index:1;
      min-height:100vh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:3rem 1.5rem;
    }
    .page.hidden { display:none !important; } /* 增加强制隐藏 */

    /* ── Landing ── */
    .landing-inner {
      display:flex; flex-direction:column;
      align-items:center; gap:1.6rem; text-align:center;
    }
    .site-title {
      font-family:'Cinzel Decorative',serif;
      font-size:clamp(3rem,10vw,5.5rem);
      font-weight:700; color:var(--accent);
      letter-spacing:.08em; line-height:1;
      animation:fadeUp .9s ease both;
    }
    .site-sub {
      font-family:'Cinzel Decorative',serif;
      font-size:clamp(.58rem,2vw,.76rem);
      color:var(--text-dim); letter-spacing:.45em; margin-top:.5rem;
      animation:fadeUp .9s .15s ease both;
    }
    .ornament {
      width:100px; height:1px; position:relative; margin:.25rem auto;
      background:linear-gradient(to right,transparent,var(--accent),transparent);
      animation:fadeUp .9s .3s ease both;
    }
    .ornament::after {
      content:'✦'; position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      font-size:.6rem; color:var(--accent);
      background:var(--bg); padding:0 .4rem;
    }
    .prompt {
      font-size:.92rem; color:var(--text-dim);
      font-weight:300; letter-spacing:.04em; line-height:2;
      animation:fadeUp .9s .45s ease both;
    }
    .btn-draw {
      margin-top:.2rem; padding:.95rem 2.8rem;
      border:1px solid var(--accent); background:transparent;
      color:var(--accent);
      font-family:'Cinzel Decorative',serif;
      font-size:.75rem; letter-spacing:.25em; cursor:pointer;
      position:relative; transition:color .3s, background .3s;
      animation:fadeUp .9s .6s ease both;
    }
    .btn-draw::before,.btn-draw::after {
      content:''; position:absolute;
      width:7px; height:7px;
      border-color:var(--accent); border-style:solid;
      transition:border-color .3s;
    }
    .btn-draw::before { top:-1px; left:-1px;   border-width:1px 0 0 1px; }
    .btn-draw::after  { bottom:-1px; right:-1px; border-width:0 1px 1px 0; }
    .btn-draw:hover { background:var(--accent); color:var(--bg); }
    .btn-draw:hover::before,.btn-draw:hover::after { border-color:var(--bg); }

    /* ── Results ── */
    #results {
      display:none; flex-direction:column;
      align-items:center; gap:0;
      justify-content:flex-start;
      padding:3.5rem 1.5rem 5rem;
    }
    #results.active { display:flex; }

    .results-eyebrow {
      font-family:'Cinzel Decorative',serif;
      font-size:.68rem; letter-spacing:.38em;
      color:var(--text-dim); margin-bottom:2.8rem;
    }

    /* ── Cards ── */
    .cards-grid {
      display:flex; gap:1.2rem;
      justify-content:center; flex-wrap:nowrap;
      width:100%; max-width:660px;
    }
    .card-slot {
      display:flex; flex-direction:column;
      align-items:center; gap:.8rem;
      flex:1; min-width:0;
    }
    .position-label {
      font-size:.62rem; letter-spacing:.3em;
      color:var(--text-dim); white-space:nowrap;
    }
    .card-wrapper {
      perspective:1000px;
      width:clamp(105px,27vw,170px);
      aspect-ratio:10/17;
    }
    .card-inner {
      width:100%; height:100%;
      position:relative; transform-style:preserve-3d;
      transition:transform .85s cubic-bezier(.4,0,.2,1);
    }
    .card-inner.flipped { transform:rotateY(180deg); }

    .card-back, .card-face {
      position:absolute; inset:0; border-radius:7px;
      backface-visibility:hidden; -webkit-backface-visibility:hidden;
    }

    .card-back {
      background:var(--card-bg);
      display:flex; align-items:center; justify-content:center;
      overflow:hidden; box-shadow:var(--shadow);
    }
    .card-back::before {
      content:''; position:absolute; inset:7px;
      border:1px solid var(--card-gdim); border-radius:3px;
    }
    .card-back::after {
      content:''; position:absolute; inset:14px;
      background-image:
        repeating-linear-gradient( 45deg, var(--card-gdim) 0,var(--card-gdim) .5px,transparent .5px,transparent 12px),
        repeating-linear-gradient(-45deg, var(--card-gdim) 0,var(--card-gdim) .5px,transparent .5px,transparent 12px);
    }
    .back-glyph {
      position:relative; z-index:1;
      font-size:.55rem; letter-spacing:.3em;
      color:rgba(196,164,124,.28);
      font-family:'Cinzel Decorative',serif;
    }

    .card-face {
      background:var(--card-bg);
      transform:rotateY(180deg);
      display:flex; flex-direction:column;
      align-items:center; justify-content:space-between;
      padding:clamp(.65rem,2.5vw,.95rem) clamp(.45rem,1.8vw,.72rem);
      border:1px solid rgba(196,164,124,.1);
      box-shadow:var(--shadow);
    }
    .card-face::before {
      content:''; position:absolute; inset:5px;
      border:1px solid rgba(196,164,124,.07);
      border-radius:3px; pointer-events:none;
    }
    .card-numeral {
      font-family:'Cinzel Decorative',serif;
      font-size:clamp(.4rem,.85vw,.56rem);
      color:rgba(196,164,124,.42); letter-spacing:.12em;
    }
    .card-symbol {
      flex:1; display:flex; align-items:center; justify-content:center;
      font-size:clamp(1.9rem,6.5vw,3rem);
      color:var(--card-gold); line-height:1;
      font-family:'Segoe UI Symbol','Apple Symbols','Noto Sans Symbols',sans-serif;
      font-style:normal;
      transition:transform .85s cubic-bezier(.4,0,.2,1) .2s;
    }
    .card-face.reversed .card-symbol { transform:rotate(180deg); }

    .card-bottom { text-align:center; }
    .card-name {
      font-family:'Cinzel Decorative',serif;
      font-size:clamp(.34rem,.7vw,.48rem);
      color:rgba(196,164,124,.6); letter-spacing:.07em; line-height:1.5;
    }
    .card-orient {
      font-size:clamp(.28rem,.55vw,.4rem);
      color:rgba(196,164,124,.32); letter-spacing:.18em; margin-top:.18rem;
    }

    .readings-section {
      width:100%; max-width:660px; margin-top:3rem;
      display:flex; flex-direction:column; gap:2rem;
    }
    .reading-block {
      opacity:0; transform:translateY(14px);
      transition:opacity .55s ease, transform .55s ease;
    }
    .reading-block.visible { opacity:1; transform:translateY(0); }

    .reading-pos { font-size:.6rem; letter-spacing:.3em; color:var(--accent); margin-bottom:.5rem; }
    .reading-card-name {
      font-family:'Cinzel Decorative',serif;
      font-size:clamp(.8rem,2.4vw,.95rem); color:var(--text); margin-bottom:.2rem;
    }
    .reading-orient  { font-size:.67rem; color:var(--text-dim); letter-spacing:.15em; margin-bottom:.65rem; }
    .reading-keywords{ font-size:.7rem; color:var(--accent-soft); letter-spacing:.08em; margin-bottom:.55rem; }
    .reading-text    { font-size:clamp(.84rem,2vw,.92rem); line-height:2; color:var(--text-dim); font-weight:300; }

    .sect-divider {
      width:100%; max-width:660px; height:1px; margin:2.8rem 0;
      background:linear-gradient(to right,transparent,var(--divider),transparent);
      position:relative; opacity:0; transition:opacity .6s ease;
    }
    .sect-divider.show { opacity:1; }
    .sect-divider::after {
      content:'✦'; position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      font-size:.58rem; color:var(--accent);
      background:var(--bg); padding:0 .5rem;
    }

    .conclusion {
      width:100%; max-width:660px;
      opacity:0; transform:translateY(12px);
      transition:opacity .65s ease .2s, transform .65s ease .2s;
    }
    .conclusion.visible { opacity:1; transform:translateY(0); }

    .conclusion-eyebrow { font-size:.6rem; letter-spacing:.35em; color:var(--text-dim); margin-bottom:1.1rem; }
    .verdict {
      font-family:'Cinzel Decorative',serif;
      font-size:clamp(1.2rem,3.5vw,1.6rem);
      color:var(--accent); letter-spacing:.06em; margin-bottom:.9rem;
    }
    .conclusion-text { font-size:clamp(.84rem,2vw,.92rem); line-height:2; color:var(--text-dim); font-weight:300; max-width:560px; }

    .actions {
      margin-top:3rem; display:flex; gap:1rem; flex-wrap:wrap;
      justify-content:center; opacity:0; transition:opacity .5s ease;
    }
    .actions.show { opacity:1; }
    .btn-restart {
      padding:.72rem 2rem;
      border:1px solid var(--border); background:transparent;
      color:var(--text-dim);
      font-family:'Noto Serif SC',serif;
      font-size:.8rem; letter-spacing:.1em; cursor:pointer;
      transition:border-color .3s, color .3s;
    }
    .btn-restart:hover { border-color:var(--accent); color:var(--accent); }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    @media (max-width:480px) { .cards-grid { gap:.55rem; } }
    @media (max-width:360px) { .card-wrapper { width:88px; } }
  </style>
</head>
<body>

<section id="landing" class="page">
  <div class="landing-inner">
    <div>
      <div class="site-title">是与非</div>
      <div class="site-sub">TAROT · YES OR NO</div>
    </div>
    <div class="ornament"></div>
    <p class="prompt">闭上眼睛<br>默念心中的问题<br>当你准备好，请抽牌</p>
    <button class="btn-draw" onclick="startReading()">抽　　牌</button>
  </div>
</section>

<section id="results" class="page">
  <div class="results-eyebrow">三　牌　阵</div>
  <div class="cards-grid">
    <div class="card-slot">
      <div class="position-label">现　状</div>
      <div class="card-wrapper"><div class="card-inner" id="ci0"><div class="card-back"><span class="back-glyph">✦</span></div><div class="card-face" id="cf0"><div class="card-numeral" id="cn0"></div><div class="card-symbol" id="cs0"></div><div class="card-bottom"><div class="card-name" id="cname0"></div><div class="card-orient" id="cor10"></div></div></div></div></div>
    </div>
    <div class="card-slot">
      <div class="position-label">阻　碍</div>
      <div class="card-wrapper"><div class="card-inner" id="ci1"><div class="card-back"><span class="back-glyph">✦</span></div><div class="card-face" id="cf1"><div class="card-numeral" id="cn1"></div><div class="card-symbol" id="cs1"></div><div class="card-bottom"><div class="card-name" id="cname1"></div><div class="card-orient" id="cor1"></div></div></div></div></div>
    </div>
    <div class="card-slot">
      <div class="position-label">建　议</div>
      <div class="card-wrapper"><div class="card-inner" id="ci2"><div class="card-back"><span class="back-glyph">✦</span></div><div class="card-face" id="cf2"><div class="card-numeral" id="cn2"></div><div class="card-symbol" id="cs2"></div><div class="card-bottom"><div class="card-name" id="cname2"></div><div class="card-orient" id="cor2"></div></div></div></div></div>
    </div>
  </div>

  <div class="readings-section" id="readings"></div>
  <div class="sect-divider" id="divider"></div>
  <div class="conclusion" id="conclusion">
    <div class="conclusion-eyebrow">综　合　解　读</div>
    <div class="verdict" id="verdict"></div>
    <p class="conclusion-text" id="concl-text"></p>
  </div>
  <div class="actions" id="actions">
    <button class="btn-restart" onclick="restart()">重新占卜</button>
  </div>
</section>

<script>
// 这里保留你原来的 CARDS 数组和所有函数逻辑
// 为了节省篇幅，假设数据部分正确，重点检查逻辑触发
const CARDS = [ /* ... 你的长数组 ... */ ];
// (此处省略你代码中完整的 CARDS 数组内容)

// 确保逻辑闭环：
function startReading() {
  // 1. 抽牌逻辑
  drawn = shuffle(CARDS).slice(0,3).map(card => ({ card, rev: Math.random() < 0.35 }));

  // 2. 填充 DOM
  drawn.forEach(({card,rev},i) => {
    const numeralEl = document.getElementById(`cn${i}`);
    const symbolEl = document.getElementById(`cs${i}`);
    const nameEl = document.getElementById(`cname${i}`);
    const orientEl = document.getElementById(`cor${i}`);
    
    if(numeralEl) numeralEl.textContent = card.numeral;
    if(symbolEl) symbolEl.textContent = card.symbol;
    if(nameEl) nameEl.textContent = card.name;
    if(orientEl) orientEl.textContent = rev ? "REVERSED" : "UPRIGHT";
    
    document.getElementById(`cf${i}`).classList.toggle('reversed', rev);
  });

  // 3. 切换页面
  document.getElementById('landing').classList.add('hidden');
  const res = document.getElementById('results');
  res.classList.add('active');

  // 4. 重置状态
  [0,1,2].forEach(i => document.getElementById(`ci${i}`).classList.remove('flipped'));
  document.getElementById('readings').innerHTML = '';
  document.getElementById('conclusion').classList.remove('visible');
  document.getElementById('divider').classList.remove('show');
  document.getElementById('actions').classList.remove('show');

  // 5. 动画序列
  setTimeout(()=>flip(0), 500);
  setTimeout(()=>flip(1), 1300);
  setTimeout(()=>flip(2), 2100);
  setTimeout(()=>showReadings(), 3100);
}

// 其余函数保持不变 (shuffle, calcVerdict, flip, showReadings, restart 等)
</script>
</body>
</html>
